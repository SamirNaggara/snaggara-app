apiVersion: apps/v1
kind: Deployment
metadata:
  name: sam-app
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sam
  template:
    metadata:
      labels:
        app: sam
    spec:
      containers:
        - name: sam-container
          image: samcyl/sam-app:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sam-service
  namespace: dev
spec:
  selector:
    app: sam
  ports:
    - protocol: TCP
      port: 8888
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sam-ingress
  namespace: dev
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sam-service
                port:
                  number: 8888
